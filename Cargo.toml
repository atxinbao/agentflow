[workspace]
members = [
    "crates/agentflow-core",
    "crates/agentflow-cli",
    "crates/agent-manual",
    "crates/panel",
    "crates/goal-tree",
    "crates/input",
    "crates/output",
    "crates/execute",
    "crates/state",
    "apps/desktop/src-tauri",
]
resolver = "2"

[workspace.package]
edition = "2021"
license = "UNLICENSED"
version = "0.0.1"

[workspace.dependencies]
anyhow = "1"
clap = { version = "4", features = ["derive"] }
rusqlite = { version = "0.39.0", features = ["bundled"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = "0.10"
tempfile = "3"
