name: release-gate

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"
  release:
    types:
      - published
  workflow_dispatch:

jobs:
  release-gate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libglib2.0-dev \
            pkg-config \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Install desktop dependencies
        run: npm --prefix apps/desktop ci

      - name: Resolve release metadata
        id: release_meta
        run: |
          event_name="${GITHUB_EVENT_NAME}"
          release_tag=""
          release_url=""

          if [[ "$event_name" == "push" && "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            release_tag="${GITHUB_REF_NAME}"
          elif [[ "$event_name" == "release" ]]; then
            release_tag="$(python3 -c 'import json, os; from pathlib import Path; payload = json.loads(Path(os.environ["GITHUB_EVENT_PATH"]).read_text(encoding="utf-8")); print((payload.get("release") or {}).get("tag_name", ""))')"
            release_url="$(python3 -c 'import json, os; from pathlib import Path; payload = json.loads(Path(os.environ["GITHUB_EVENT_PATH"]).read_text(encoding="utf-8")); print((payload.get("release") or {}).get("html_url", ""))')"
          fi

          if [[ -z "$release_tag" ]]; then
            package_version="$(python3 -c 'import tomllib; from pathlib import Path; payload = tomllib.loads(Path("Cargo.toml").read_text(encoding="utf-8")); print(payload["workspace"]["package"]["version"])')"
            release_tag="v${package_version}"
          fi
          if [[ -z "$release_url" ]]; then
            release_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/releases/tag/${release_tag}"
          fi

          artifact_dir="artifacts/release-gate-${release_tag}-e2e"
          certification_dir="artifacts/release-gate-${release_tag}-certification"
          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"
          echo "release_version=$release_tag" >> "$GITHUB_OUTPUT"
          echo "release_url=$release_url" >> "$GITHUB_OUTPUT"
          echo "artifact_dir=$artifact_dir" >> "$GITHUB_OUTPUT"
          echo "certification_dir=$certification_dir" >> "$GITHUB_OUTPUT"

      - name: Rust format check
        run: cargo fmt --all --check

      - name: Rust tests
        env:
          RUST_TEST_THREADS: 1
        run: cargo test --workspace

      - name: Desktop build
        run: npm --prefix apps/desktop run build

      - name: Browser preview smoke
        run: |
          artifact_dir="${{ steps.release_meta.outputs.artifact_dir }}"
          mkdir -p "$artifact_dir"
          log_path="$artifact_dir/browser-preview-smoke.log"
          status_path="$artifact_dir/browser-preview-smoke.status.json"

          set +e
          npm --prefix apps/desktop run preview:smoke > "$log_path" 2>&1
          exit_code=$?
          set -e

          node -e "const fs=require('fs'); const code=Number(process.argv[2]); fs.writeFileSync(process.argv[1], JSON.stringify({command:'npm --prefix apps/desktop run preview:smoke', exitCode: code, status: code === 0 ? 'passed' : 'failed', logPath:'browser-preview-smoke.log'}, null, 2) + '\n');" "$status_path" "$exit_code"

          cat "$log_path"
          exit "$exit_code"

      - name: Console readiness
        run: |
          artifact_dir="${{ steps.release_meta.outputs.artifact_dir }}"
          mkdir -p "$artifact_dir"
          log_path="$artifact_dir/console-readiness.log"
          status_path="$artifact_dir/console-readiness.status.json"

          set +e
          npm --prefix apps/desktop run console:readiness > "$log_path" 2>&1
          exit_code=$?
          set -e

          node -e "const fs=require('fs'); const code=Number(process.argv[2]); fs.writeFileSync(process.argv[1], JSON.stringify({command:'npm --prefix apps/desktop run console:readiness', exitCode: code, status: code === 0 ? 'passed' : 'failed', logPath:'console-readiness.log'}, null, 2) + '\n');" "$status_path" "$exit_code"

          cat "$log_path"
          exit "$exit_code"

      - name: Release gate E2E
        env:
          RELEASE_VERSION: ${{ steps.release_meta.outputs.release_version }}
          RELEASE_TAG_NAME: ${{ steps.release_meta.outputs.release_tag }}
          RELEASE_URL: ${{ steps.release_meta.outputs.release_url }}
          SOURCE_COMMIT_SHA: ${{ github.sha }}
        run: |
          bash scripts/verify_release_gate.sh \
            --artifact-dir "${{ steps.release_meta.outputs.artifact_dir }}" \
            --release-version "${{ steps.release_meta.outputs.release_version }}" \
            --release-tag "${{ steps.release_meta.outputs.release_tag }}" \
            --source-commit-sha "${{ github.sha }}" \
            --release-url "${{ steps.release_meta.outputs.release_url }}"

      - name: Append gate summary
        if: always()
        run: |
          artifact_dir="${{ steps.release_meta.outputs.artifact_dir }}"
          if [ -f "$artifact_dir/certification.md" ]; then
            cat "$artifact_dir/certification.md" >> "$GITHUB_STEP_SUMMARY"
            printf "\n\n" >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ -f "$artifact_dir/summary.md" ]; then
            cat "$artifact_dir/summary.md" >> "$GITHUB_STEP_SUMMARY"
          fi
          for status_file in \
            "$artifact_dir/browser-preview-smoke.status.json" \
            "$artifact_dir/console-readiness.status.json"
          do
            if [ -f "$status_file" ]; then
              printf "\n\n## %s\n\n" "$(basename "$status_file" .status.json)" >> "$GITHUB_STEP_SUMMARY"
              printf '```json\n' >> "$GITHUB_STEP_SUMMARY"
              cat "$status_file" >> "$GITHUB_STEP_SUMMARY"
              printf '```\n' >> "$GITHUB_STEP_SUMMARY"
            fi
          done

      - name: Prepare certification artifact
        if: always()
        run: |
          artifact_dir="${{ steps.release_meta.outputs.artifact_dir }}"
          certification_dir="${{ steps.release_meta.outputs.certification_dir }}"
          rm -rf "$certification_dir"
          mkdir -p "$certification_dir/runtime"

          for file in \
            status.json \
            summary.json \
            summary.md \
            certification.json \
            certification.md \
            artifact-manifest.json \
            stage-log.jsonl \
            browser-preview-smoke.status.json \
            console-readiness.status.json
          do
            if [ -f "$artifact_dir/$file" ]; then
              cp "$artifact_dir/$file" "$certification_dir/$file"
            fi
          done

          if [ -d "$artifact_dir/runtime" ]; then
            find "$artifact_dir/runtime" -maxdepth 1 -type f \( \
              -name '*certification*.json' \
              -o -name '*provenance*.json' \
              -o -name '*boundary*.json' \
              -o -name '*baseline*.json' \
              -o -name '*negative*.json' \
              -o -name '*governance*.json' \
              -o -name '*roadmap*.json' \
              -o -name '*artifact*.json' \
              -o -name 'core-4d-spec-intake.json' \
              -o -name 'core-4d-spec-intake-rust-test.log' \
              -o -name 'core-4d-spec-intake-positive-rust-test.log' \
              -o -name 'core-4d-spec-intake-negative-rust-test.log' \
              -o -name 'core-ontology-kernel.json' \
              -o -name 'core-ontology-kernel-rust-test.log' \
              -o -name 'core-object-link-schema.json' \
              -o -name 'core-object-link-schema-rust-test.log' \
              -o -name 'core-action-state-semantics.json' \
              -o -name 'core-action-state-semantics-rust-test.log' \
              -o -name 'core-skill-registry.json' \
              -o -name 'core-skill-registry-rust-test.log' \
              -o -name 'core-evidence-decision-reference-model.json' \
              -o -name 'core-evidence-decision-reference-model-rust-test.log' \
              -o -name 'core-evidence-pack-schema.json' \
              -o -name 'core-evidence-pack-schema-rust-test.log' \
              -o -name 'core-evidence-source-type-registry.json' \
              -o -name 'core-evidence-source-type-registry-rust-test.log' \
              -o -name 'core-evidence-capture-receipts.json' \
              -o -name 'core-evidence-capture-receipts-rust-test.log' \
              -o -name 'core-evidence-authority-trace-links.json' \
              -o -name 'core-evidence-authority-trace-links-rust-test.log' \
              -o -name 'core-evidence-authority-trace-links-event-store-rust-test.log' \
              -o -name 'core-evidence-completeness-policy.json' \
              -o -name 'core-evidence-completeness-policy-rust-test.log' \
              -o -name 'core-missing-evidence-handling.json' \
              -o -name 'core-missing-evidence-handling-rust-test.log' \
              -o -name 'core-external-proof-provenance.json' \
              -o -name 'core-external-proof-provenance-rust-test.log' \
              -o -name 'software-dev-reference-evidence-mapping.json' \
              -o -name 'software-dev-reference-evidence-mapping-rust-test.log' \
              -o -name 'evidence-projection-read-model.json' \
              -o -name 'evidence-projection-read-model-rust-test.log' \
              -o -name 'core-file-backed-ontology-registry.json' \
              -o -name 'core-file-backed-ontology-registry-rust-test.log' \
              -o -name 'core-runtime-negative-fixtures.json' \
              -o -name 'core-runtime-negative-runtime-api-test.log' \
              -o -name 'core-runtime-negative-arbitration-test.log' \
              -o -name 'core-runtime-negative-task-artifacts-test.log' \
              -o -name 'core-runtime-negative-projection-test.log' \
              -o -name 'core-runtime-kernel.json' \
              -o -name 'core-runtime-kernel-runtime-api-test.log' \
              -o -name 'core-runtime-admission.json' \
              -o -name 'core-runtime-admission-rust-test.log' \
              -o -name 'core-runtime-arbitration.json' \
              -o -name 'core-runtime-arbitration-rust-test.log' \
              -o -name 'v105-release-certification.json' \
            \) -exec cp {} "$certification_dir/runtime/" \;
          fi

          for primary_proof in \
            runtime/core-4d-spec-intake.json \
            runtime/core-4d-spec-intake-rust-test.log \
            runtime/core-4d-spec-intake-positive-certification.json \
            runtime/core-4d-spec-intake-positive-rust-test.log \
            runtime/core-4d-spec-intake-negative-certification.json \
            runtime/core-4d-spec-intake-negative-rust-test.log \
            runtime/core-ontology-kernel.json \
            runtime/core-ontology-kernel-rust-test.log \
            runtime/core-object-link-schema.json \
            runtime/core-object-link-schema-rust-test.log \
            runtime/core-action-state-semantics.json \
            runtime/core-action-state-semantics-rust-test.log \
            runtime/core-skill-registry.json \
            runtime/core-skill-registry-rust-test.log \
            runtime/core-evidence-decision-reference-model.json \
            runtime/core-evidence-decision-reference-model-rust-test.log \
            runtime/core-evidence-pack-schema.json \
            runtime/core-evidence-pack-schema-rust-test.log \
            runtime/core-evidence-source-type-registry.json \
            runtime/core-evidence-source-type-registry-rust-test.log \
            runtime/core-evidence-capture-receipts.json \
            runtime/core-evidence-capture-receipts-rust-test.log \
            runtime/core-evidence-authority-trace-links.json \
            runtime/core-evidence-authority-trace-links-rust-test.log \
            runtime/core-evidence-authority-trace-links-event-store-rust-test.log \
            runtime/core-evidence-completeness-policy.json \
            runtime/core-evidence-completeness-policy-rust-test.log \
            runtime/core-missing-evidence-handling.json \
            runtime/core-missing-evidence-handling-rust-test.log \
            runtime/core-external-proof-provenance.json \
            runtime/core-external-proof-provenance-rust-test.log \
            runtime/software-dev-reference-evidence-mapping.json \
            runtime/software-dev-reference-evidence-mapping-rust-test.log \
            runtime/evidence-projection-read-model.json \
            runtime/evidence-projection-read-model-rust-test.log \
            runtime/core-file-backed-ontology-registry.json \
            runtime/core-file-backed-ontology-registry-rust-test.log \
            runtime/v104-release-certification.json \
            runtime/core-runtime-negative-fixtures.json \
            runtime/core-runtime-negative-runtime-api-test.log \
            runtime/core-runtime-negative-arbitration-test.log \
            runtime/core-runtime-negative-task-artifacts-test.log \
            runtime/core-runtime-negative-projection-test.log \
            runtime/core-runtime-kernel.json \
            runtime/core-runtime-kernel-runtime-api-test.log \
            runtime/core-runtime-admission.json \
            runtime/core-runtime-admission-rust-test.log \
            runtime/core-runtime-arbitration.json \
            runtime/core-runtime-arbitration-rust-test.log \
            runtime/v105-release-certification.json
          do
            if [ ! -f "$certification_dir/$primary_proof" ]; then
              echo "missing certification primary proof: $primary_proof" >&2
              exit 1
            fi
          done

      - name: Upload certification artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-gate-certification-${{ steps.release_meta.outputs.release_version }}
          path: ${{ steps.release_meta.outputs.certification_dir }}
          if-no-files-found: error

      - name: Upload full gate artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-gate-full-${{ steps.release_meta.outputs.release_version }}
          path: ${{ steps.release_meta.outputs.artifact_dir }}
          if-no-files-found: warn
