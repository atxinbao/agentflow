name: release-gate

env:
  RELEASE_VERSION: v0.5.1
  RELEASE_GATE_ARTIFACT_DIR: artifacts/release-gate-v0.5.1-e2e

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  release-gate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libglib2.0-dev \
            pkg-config \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Install desktop dependencies
        run: npm --prefix apps/desktop ci

      - name: Rust format check
        run: cargo fmt --all --check

      - name: Rust tests
        env:
          RUST_TEST_THREADS: 1
        run: cargo test --workspace

      - name: Desktop build
        run: npm --prefix apps/desktop run build

      - name: Release gate E2E
        run: bash scripts/verify_release_gate.sh --artifact-dir "$RELEASE_GATE_ARTIFACT_DIR"

      - name: Append gate summary
        if: always()
        run: |
          if [ -f "$RELEASE_GATE_ARTIFACT_DIR/certification.md" ]; then
            cat "$RELEASE_GATE_ARTIFACT_DIR/certification.md" >> "$GITHUB_STEP_SUMMARY"
            printf "\n\n" >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ -f "$RELEASE_GATE_ARTIFACT_DIR/summary.md" ]; then
            cat "$RELEASE_GATE_ARTIFACT_DIR/summary.md" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload gate artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-gate-${{ env.RELEASE_VERSION }}
          path: ${{ env.RELEASE_GATE_ARTIFACT_DIR }}
          if-no-files-found: warn
